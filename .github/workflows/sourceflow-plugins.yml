name: SourceFlow Plugins

on:
  push:
    branches: ["main"]
    paths:
      - "submissions/**"
      - "packages/**"
      - "plugins/**"
      - "stats/**"
      - "scripts/generate-bazaar.js"
      - "scripts/validate-bazaar.js"
      - ".github/workflows/sourceflow-plugins.yml"
      - "README.md"
      - "PLUGIN_DEVELOPMENT.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-bazaar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate submissions
        run: node ./scripts/validate-bazaar.js --root .

      - name: Generate static bazaar
        run: node ./scripts/generate-bazaar.js --root . --output ./dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-bazaar:
    needs: build-bazaar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
